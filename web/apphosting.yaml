# Firebase App Hosting configuration for the Next.js Phase 1 web app.
# The app root should be set to `web` when creating the App Hosting backend.

runConfig:
  minInstances: 0
  maxInstances: 3
  concurrency: 40
  cpu: 1
  memoryMiB: 512

env:
  - variable: BOQ_AUTO_API_BASE_URL
    value: https://boq-auto-api-kwtvam3qtq-uc.a.run.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyDCK7CYT-wWWAydb1UUmKInftz2Ngqu9aM"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "project-05a5d388-27e0-4fe6-aa5.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "project-05a5d388-27e0-4fe6-aa5"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "project-05a5d388-27e0-4fe6-aa5.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "661636939203"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:661636939203:web:be599e3639b4e20364d176"
    availability:
      - BUILD
      - RUNTIME
